    <style>
        /* Project List Specific Styles */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
        }
        
        .project-card {
            display: flex;
            flex-direction: column;
            height: 100%;
            text-decoration: none;
            color: var(--text-primary);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .project-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .project-title {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 600;
        }

        .project-desc {
            font-size: 0.95rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 16px;
            flex-grow: 1;
        }

        .project-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .project-tag {
            font-size: 0.75rem;
            padding: 4px 8px;
            border-radius: 4px;
            background: rgba(var(--accent-rgb), 0.1);
            color: var(--accent-color);
            font-weight: 500;
        }
        
        .main-panel-full {
            grid-column: span 9; /* Occupy remaining space */
        }

        @media (max-width: 960px) {
            .main-panel-full {
                grid-column: span 12;
            }
        }
    </style>
</head>
<body>
    <div class="background-gradient"></div>
    <canvas id="starfield-layer1" class="starfield-canvas" data-layer-id="1"></canvas>
    <canvas id="starfield-layer2" class="starfield-canvas" data-layer-id="2"></canvas>
    <canvas id="starfield-layer3" class="starfield-canvas" data-layer-id="3"></canvas>
    <canvas id="shooting-star-canvas" class="starfield-canvas"></canvas>
    <canvas id="raindrop-canvas" class="starfield-canvas"></canvas>

    <div class="settings-wrapper">
        <button id="settings-toggle" type="button" aria-label="打开设置">
            <i class="fa-solid fa-gear" aria-hidden="true"></i>
            <span class="icon-text">设定</span>
        </button>
    </div>

    <div id="settings-panel" class="card card--tertiary glass" hidden>
        <div class="settings-header">
            <h3>显示设置</h3>
            <button id="settings-close" type="button">&times;</button>
        </div>
        <div class="settings-content">
            <div class="setting-item">
                <label for="toggle-high-contrast">高对比模式</label>
                <input type="checkbox" id="toggle-high-contrast" class="toggle-switch" data-setting="highContrast">
            </div>
            <div class="setting-item">
                <label for="toggle-lite-mode">轻量模式</label>
                <input type="checkbox" id="toggle-lite-mode" class="toggle-switch" data-setting="liteMode">
            </div>
            <div class="setting-item">
                <label for="toggle-starfield">星空背景</label>
                <input type="checkbox" id="toggle-starfield" class="toggle-switch" data-setting="starfield" checked>
            </div>
            <div class="setting-item">
                <label for="toggle-shooting-stars">流星效果</label>
                <input type="checkbox" id="toggle-shooting-stars" class="toggle-switch" data-setting="shootingStars" checked>
            </div>
            <div class="setting-item">
                <label for="toggle-raindrops">雨滴效果</label>
                <input type="checkbox" id="toggle-raindrops" class="toggle-switch" data-setting="raindrops" checked>
            </div>
            <div class="setting-item">
                <label for="toggle-card-float">卡片浮动</label>
                <input type="checkbox" id="toggle-card-float" class="toggle-switch" data-setting="cardFloat" checked>
            </div>
        </div>
    </div>

    <div class="theme-switch-wrapper">
        <button id="theme-toggle" type="button" aria-label="切换主题">
            <i class="fa-solid fa-moon" aria-hidden="true"></i>
            <span class="theme-toggle-text">深色</span>
        </button>
    </div>
    
    <div class="parallax-container">
        <div class="grid-container layout-grid">
            <aside class="nav-panel" aria-label="主导航">

                    <span class="brand-sub">观测站 · 控制台</span>

                    </a>
                </nav>
            </aside>

            <main id="main-content" class="main-panel main-panel-full" aria-labelledby="projects-heading">
                <div class="card card--tertiary glass">
                    <div class="card-header">
                        <h2 class="card-title" id="projects-heading">项目列表</h2>
                    </div>
                    <div id="project-container" class="project-grid">
                        <!-- Projects will be loaded here -->
                        <div style="padding: 20px; text-align: center; color: var(--text-secondary);">
                            <i class="fa-solid fa-spinner fa-spin"></i> 加载中...
                        </div>
                    </div>
                </div>
            </main>
        </div>
